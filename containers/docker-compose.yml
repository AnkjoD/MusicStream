x-airflow-common: &airflow-common
  build:
    context: ..
    dockerfile: containers/airflow/Dockerfile
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    AIRFLOW__CELERY__BROKER_URL: ${REDIS_BROKER_URL}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session"
    AIRFLOW__SCHEDULER__STATSD_ON: "false"
    AIRFLOW_UID: ${AIRFLOW_UID}
    _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME}
    _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD}
  volumes:
    - ${AIRFLOW_DAGS_PATH}:/opt/airflow/dags
    - ${AIRFLOW_LOGS_PATH}:/opt/airflow/logs
    - ${AIRFLOW_PLUGINS_PATH}:/opt/airflow/plugins
    - ${AIRFLOW_CONFIG_PATH}:/opt/airflow/config
    - ../src:/opt/airflow/src
  user: "${AIRFLOW_UID:-50000}:0"
  networks:
    - bigdata-network

services:
  postgres:
    # QUAN TRỌNG: Giữ nguyên postgres:16 vì data volume đã khởi tạo với version này.
    # Nâng cấp lên 17.x cần chạy pg_upgrade thủ công.
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ${POSTGRES_DATA_PATH}:/var/lib/postgresql/data
    networks:
      - bigdata-network
    healthcheck:
      test:
        ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 10s
      retries: 5
    restart: always

  redis:
    image: redis:7
    container_name: redis
    networks:
      - bigdata-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5
    restart: always

  kafka:
    image: ${KAFKA_IMAGE}
    container_name: kafka
    ports:
      - "${KAFKA_EXTERNAL_PORT}:9094"
    environment:
      KAFKA_NODE_ID: ${KAFKA_NODE_ID}
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:29093,PLAINTEXT_HOST://:9094"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9094"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
      KAFKA_HEAP_OPTS: ${KAFKA_HEAP_OPTS}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - ${KAFKA_DATA_PATH}:/var/lib/kafka/data
    networks:
      - bigdata-network
    restart: always

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    ports:
      - "${KAFKA_UI_PORT}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: streamlify-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_METRICS_PORT: 9997
    depends_on:
      - kafka
    networks:
      - bigdata-network
    restart: always

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "${AIRFLOW_WEB_PORT}:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    restart: always

  airflow-worker:
    <<: *airflow-common
    container_name: airflow-worker
    command: celery worker
    environment:
      <<: *airflow-common-env
      DUMB_INIT_SETSID: "0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    restart: always

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username "$${_AIRFLOW_WWW_USER_USERNAME}" \
          --password "$${_AIRFLOW_WWW_USER_PASSWORD}" \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com 2>/dev/null || true
    environment:
      <<: *airflow-common-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  spark-master:
    build:
      context: ..
      dockerfile: containers/spark/Dockerfile
    container_name: spark-master
    ports:
      - "7077:7077"
      - "8082:8080"
    environment:
      SPARK_MODE: master
    volumes:
      - ../src:/data
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    networks:
      - bigdata-network
    restart: always

  spark-worker-1:
    build:
      context: ..
      dockerfile: containers/spark/Dockerfile
    container_name: spark-worker-1
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_CORES: ${SPARK_WORKER_CORES:-2}
      SPARK_WORKER_MEMORY: ${SPARK_WORKER_MEMORY:-2G}
      SPARK_WORKER_WEBUI_PORT: 8081
    volumes:
      - ../src:/data
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    networks:
      - bigdata-network
    depends_on:
      - spark-master
    restart: always

  spark-worker-2:
    build:
      context: ..
      dockerfile: containers/spark/Dockerfile
    container_name: spark-worker-2
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_CORES: ${SPARK_WORKER_CORES:-2}
      SPARK_WORKER_MEMORY: ${SPARK_WORKER_MEMORY:-2G}
      SPARK_WORKER_WEBUI_PORT: 8083
    volumes:
      - ../src:/data
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    networks:
      - bigdata-network
    depends_on:
      - spark-master
    restart: always

  # Worker thứ 3 - Fully Distributed (3 nodes)
  spark-worker-3:
    build:
      context: ..
      dockerfile: containers/spark/Dockerfile
    container_name: spark-worker-3
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_CORES: ${SPARK_WORKER_CORES:-2}
      SPARK_WORKER_MEMORY: ${SPARK_WORKER_MEMORY:-2G}
      SPARK_WORKER_WEBUI_PORT: 8084
    volumes:
      - ../src:/data
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    networks:
      - bigdata-network
    depends_on:
      - spark-master
    restart: always

  # Spark History Server - Xem lịch sử jobs sau khi chạy xong
  spark-history-server:
    build:
      context: ..
      dockerfile: containers/spark/Dockerfile
    container_name: spark-history-server
    ports:
      - "18080:18080"
    environment:
      - SPARK_HISTORY_OPTS=-Dspark.history.fs.logDirectory=s3a://bronze-zone/spark-events -Dspark.hadoop.fs.s3a.endpoint=http://minio:9000 -Dspark.hadoop.fs.s3a.access.key=homura_madoka -Dspark.hadoop.fs.s3a.secret.key=homura123 -Dspark.hadoop.fs.s3a.path.style.access=true -Dspark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.history.HistoryServer
    networks:
      - bigdata-network
    depends_on:
      - spark-master
    restart: always

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: minio
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ${MINIO_DATA_PATH}/drive1:/data1
      - ${MINIO_DATA_PATH}/drive2:/data2
      - ${MINIO_DATA_PATH}/drive3:/data3
      - ${MINIO_DATA_PATH}/drive4:/data4
    command: server /data{1...4} --console-address ":9001"
    networks:
      - bigdata-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  dashboard:
    build:
      context: ..
      dockerfile: containers/dashboard/Dockerfile
    container_name: dashboard
    ports:
      - "8501:8501"
    environment:
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=homura_madoka
      - MINIO_SECRET_KEY=homura123
    volumes:
      - ../src:/app/src
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      [
        "streamlit",
        "run",
        "/app/src/dashboard/app.py",
        "--server.port=8501",
        "--server.address=0.0.0.0",
      ]
    networks:
      - bigdata-network
    depends_on:
      - minio

  eventsim:
    build:
      context: ..
      dockerfile: containers/eventsim/Dockerfile
    container_name: eventsim
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - bigdata-network
    environment:
      - KAFKA_BROKER=kafka:9092
      - KAFKA_TOPIC=eventsim
      - NUM_USERS=200
      - GROWTH_RATE=0.0
      - EVENT_DELAY_MS=200
      - REAL_TIME=true
    restart: on-failure

networks:
  bigdata-network:
    name: bigdata-network
    driver: bridge
